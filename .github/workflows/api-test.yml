name: API Test Automation

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Create config.properties
        run: |
          mkdir -p src/test/resources
          echo "base.uri=https://serverest.dev" > src/test/resources/config.properties

      - name: Run tests
        run: mvn test

      - name: Generate Surefire report
        if: always()
        run: mvn site -DskipTests

      - name: Upload Surefire report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/site/
          retention-days: 7

      - name: Post test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Surefire Report | Download artifact \`surefire-report\` → open \`surefire-report.html\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY